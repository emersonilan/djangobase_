{% extends 'cadastro/base.html' %}

{% block titulo %}Deletar {{ pessoa.nome }}{% endblock %}

{% block conteudo %}
    <h1>Deletar {{ pessoa.nome }}?</h1>
    <p>Essa ação não pode ser desfeita!</p>

    <form method="POST">
        {% csrf_token %}
        <button type="submit">Confirmar</button>
        <a href="{% url 'detalhe' id=pessoa.id %}">Cancelar</a>
    </form>
{% endblock %}
